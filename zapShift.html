<script>
      //console it for the output
    function ValidatingOtp(otp){
        if(otp.startsWith("ph") && otp.length==8 && typeof otp === "string" ){
              document.write("valid Otp")
            
        }else{
            document.write("invalid")
          
        }

    }

    ValidatingOtp("ph678217")
</script>
